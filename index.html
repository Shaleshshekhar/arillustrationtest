<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

  <title>AR Illustrations</title>
  <meta itemprop="name" content="AR Illustrations">
  <meta name="twitter:title" content="AR Illustrations">
  <meta property="og:title" content="AR Illustrations">
  <meta property="og:site_name" content="AR Illustrations">
  <meta name="description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta itemprop="description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta property="og:description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta name="twitter:description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="manifest" href="./assets/site.webmanifest">
  <meta name="theme-color" content="#D89A5B">
  
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
 
  <script async src="./engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    AFRAME.registerComponent('target-video-handler', {
      init: function () {
        const el = this.el
        const video = document.querySelector(el.getAttribute('src'))

        // Play video when target comes into smartphone frame view
        el.id, el.parentNode.addEventListener('xrimagefound', () => {
          if (video) {
            video.play().catch(err => console.log("Playback error: ", err))
          }
        })

        // Pause video stream when tracking is broken to save system memory
        el.parentNode.addEventListener('xrimagelost', () => {
          if (video) {
            video.pause()
          }
        })
      }
    })
  </script>

  <script>
    const onxrloaded = () => {
      console.log('XR LOADED')

      XR8.XrController.configure({
        imageTargetData: [{
          name: 'bear_target',
          type: 'PLANAR',
          imagePath: './assets/targets/bear_target_luminance.jpg',
          properties: {
            top: 320,
            left: 0,
            width: 960,
            height: 1280,
            isRotated: false,
            originalWidth: 960,
            originalHeight: 1920
          }
        }]
      })

      console.log('BEAR IMAGE TARGET CONFIGURED')
    }

    window.XR8
      ? onxrloaded()
      : window.addEventListener('xrloaded', onxrloaded)
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* ===== OVERLAY ===== */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #F6E3C5;
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    /* ===== BACKGROUND ===== */
    #gradient-bg, #light-sweep, #noise, #glass-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #gradient-bg svg {
      width: 120%;
      height: 120%;
    }

    /* ===== LIGHT SWEEP ===== */
    #light-sweep {
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: sweep 10s linear infinite;
    }

    @keyframes sweep {
      from { transform: translateX(-100%); }
      to { transform: translateX(100%); }
    }

    /* ===== NOISE ===== */
    #noise {
      background-image: url('./assets/noise.png');
      opacity: 0.05;
      mix-blend-mode: overlay;
    }

    /* ===== GLASS ===== */
    #glass-layer {
      backdrop-filter: blur(60px);
      background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* ===== CONTENT ===== */
    #content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      width: 100%;
      padding: 40px 20px;
      box-sizing: border-box;
      pointer-events: auto;
    }

    #visual-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex-grow: 1;
      justify-content: center;
    }

    /* FLOAT */
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    #splash-art {
      width: min(90vw, 420px);
      aspect-ratio: 1;
      animation: float 6s ease-in-out infinite;
    }

    #signature {
      width: min(40vw, 180px);
      aspect-ratio: 1;
      animation: float 7s ease-in-out infinite;
    }

    /* ===== BUTTON ===== */
    #start-button {
      position: relative;
      padding: 16px 36px;
      font-size: 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: #b5a89a;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      transition: all 0.4s ease;
      overflow: hidden;
      isolation: isolate;
    }

    /* shimmer */
    #start-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-20deg);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      from { left: -150%; }
      to { left: 150%; }
    }

    #start-button span {
      position: relative;
      z-index: 1;
    }

    /* READY */
    #start-button.active {
      background: linear-gradient(135deg, #E6A85C, #C97A3D);
      pointer-events: auto;
      animation: glow 1.5s infinite alternate;
    }

    #start-button.active::before {
      display: none;
    }

    #start-button:active {
      transform: scale(0.96);
    }

    @keyframes glow {
      from { box-shadow: 0 0 10px rgba(230,168,92,0.3); }
      to   { box-shadow: 0 0 20px rgba(230,168,92,0.6); }
    }

    /* DOTS */
    .dot {
      opacity: 0.2;
      animation: dotPulse 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotPulse {
      0%,80%,100% { opacity: 0.2; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }
  </style>
</head>

<body>

  <div id="start-overlay">
    <div id="gradient-bg">
      <svg viewBox="0 0 800 800">
        <defs>
          <filter id="blur">
            <feGaussianBlur stdDeviation="80"/>
          </filter>
          <radialGradient id="g1">
            <stop offset="0%" stop-color="#FFD27A"/>
            <stop offset="100%" stop-color="#E6A85C"/>
          </radialGradient>
        </defs>
        <g filter="url(#blur)">
          <circle cx="400" cy="400" r="300" fill="url(#g1)"/>
        </g>
      </svg>
    </div>

    <div id="light-sweep"></div>
    <div id="noise"></div>
    <div id="glass-layer"></div>

    <div id="content">
      <div id="visual-group">
        <img id="splash-art" src="./assets/splash-art.png">
        <img id="signature" src="./assets/signature.png">
      </div>

      <button id="start-button">
        <span id="btn-text">Loading AR</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
        <span class="dot">.</span>
      </button>
    </div>
  </div>

  <a-scene
    xrextras-gesture-detector
    xrextras-runtime-error
    xrweb="disableWorldTracking: true; canvas: #xr-canvas">
  
    <a-assets>
      <video 
        id="bearVideo" 
        src="./assets/video/bear_video.mp4"
        preload="auto" 
        loop="true" 
        muted="true" 
        playsinline 
        webkit-playsinline>
      </video>
    </a-assets>

    <a-camera position="0 1.6 0"></a-camera>
    
    <xrextras-named-image-target name="bear_target">
        
      <a-video
        id="bearPlane"
        src="#bearVideo"
        target-video-handler
        width="0.75"
        height="1.0"
        position="0 0 0"
        rotation="0 0 0">
      </a-video> 

    </xrextras-named-image-target>

  </a-scene>

  <canvas id="xr-canvas" style="position: fixed; inset: 0; pointer-events: none; z-index: 1;"></canvas>

  <script>
    window.addEventListener("load", () => {
      const button = document.getElementById("start-button");
      const btnText = document.getElementById("btn-text");

      let xrReady = false;
      let videoReady = false;

      const checkReady = () => {
        if (xrReady && videoReady) {
          button.classList.add("active");
          btnText.textContent = "Start AR";
          document.querySelectorAll(".dot").forEach(el => el.remove());
        }
      };

      if (window.XR8) {
        xrReady = true;
        checkReady();
      } else {
        window.addEventListener("xrloaded", () => {
          xrReady = true;
          checkReady();
        });
      }

      const waitForVideo = () => {
        const videos = document.querySelectorAll("video");

        // Ignore our asset-managed target video, look specifically for 8th Wall's camera stream stream feed
        const cameraFeed = Array.from(videos).find(v => v.id !== "bearVideo");

        if (!cameraFeed) {
          setTimeout(waitForVideo, 300);
          return;
        }

        if (cameraFeed.readyState >= 2) {
          videoReady = true;
          checkReady();
          return;
        }

        cameraFeed.addEventListener("loadeddata", () => {
          videoReady = true;
          checkReady();
        }, { once: true });
      };

      waitForVideo();

      button.onclick = async () => {
        if (!button.classList.contains("active")) return;

        // User gesture initialization interaction unlock
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          await ctx.resume();
        } catch(e){}

        // Audio stream setup for our targets video asset context wrapper
        const targetVideo = document.getElementById("bearVideo");
        if(targetVideo) {
          targetVideo.play().then(() => {
            targetVideo.pause();
            targetVideo.muted = false; // Safely unmute after system registration
          }).catch(e => console.log("Audio unlock tracking skipped", e));
        }

        const overlay = document.getElementById("start-overlay");
        overlay.style.opacity = 0;
        
        setTimeout(() => {
          overlay.remove();
          document.getElementById("xr-canvas").style.pointerEvents = "auto";
        }, 600);
      };
    });
  </script>

</body>
</html>
