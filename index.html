<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AR Illustrations</title>
  <meta itemprop="name" content="AR Illustrations">
  <meta name="twitter:title" content="AR Illustrations">
  <meta property="og:title" content="AR Illustrations">
  <meta property="og:site_name" content="AR Illustrations">
  <meta name="description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta itemprop="description" content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta property="og:description"
    content="Bring your illustrations to life with immersive augmented reality experiences.">
  <meta name="twitter:description"
    content="Bring your illustrations to life with immersive augmented reality experiences.">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="manifest" href="./assets/site.webmanifest">
  <meta name="theme-color" content="#D89A5B">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous"
    data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js"
    crossorigin="anonymous"></script>
  <meta property="og:image" content="./assets/preview.png">
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ===== REAL PROGRESS BAR ===== */
    #progress-container {
      width: min(80vw, 300px);
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      /* Added for smooth hiding */
    }

    #progress-track {
      width: 100%;
      height: 6px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #E6A85C, #C97A3D);
      border-radius: 99px;
      transition: width 0.2s ease;
    }

    #progress-text {
      font-size: 13px;
      color: #7a6e61;
      font-weight: 500;
    }

    /* ===== OVERLAY ===== */

    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #F6E3C5;
    }

    /* ===== BACKGROUND ===== */

    #gradient-bg,
    #light-sweep,
    #noise,
    #glass-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    #gradient-bg svg {
      width: 120%;
      height: 120%;
    }

    /* ===== LIGHT SWEEP ===== */

    #light-sweep {
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      animation: sweep 10s linear infinite;
    }

    @keyframes sweep {
      from {
        transform: translateX(-100%);
      }

      to {
        transform: translateX(100%);
      }
    }

    /* ===== NOISE ===== */

    #noise {
      background-image: url('./assets/noise.png');
      opacity: 0.05;
      mix-blend-mode: overlay;
    }

    /* ===== GLASS ===== */

    #glass-layer {
      backdrop-filter: blur(60px);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* ===== CONTENT ===== */

    #content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100%;
      width: 100%;
      padding: 40px 20px;
      box-sizing: border-box;
      pointer-events: auto;
    }

    #visual-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex-grow: 1;
      justify-content: center;
    }

    /* FLOAT */

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    #splash-art {
      width: min(90vw, 420px);
      aspect-ratio: 1;
      animation: float 6s ease-in-out infinite;
    }

    #signature {
      width: min(40vw, 180px);
      aspect-ratio: 1;
      animation: float 7s ease-in-out infinite;
    }

    /* ===== BUTTON ===== */

    #start-button {
      position: relative;
      padding: 16px 36px;
      font-size: 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;

      background: #b5a89a;
      color: #fff;

      display: flex;
      align-items: center;
      gap: 6px;

      pointer-events: none;
      transition: all 0.4s ease;

      overflow: hidden;
      isolation: isolate;
    }

    /* shimmer */

    #start-button::before {
      content: "";
      position: absolute;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: skewX(-20deg);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      from {
        left: -150%;
      }

      to {
        left: 150%;
      }
    }

    #start-button span {
      position: relative;
      z-index: 1;
    }

    /* READY */

    #start-button.active {
      background: linear-gradient(135deg, #E6A85C, #C97A3D);
      pointer-events: auto;
      animation: glow 1.5s infinite alternate;
    }

    #start-button.active::before {
      display: none;
    }

    #start-button:active {
      transform: scale(0.96);
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 10px rgba(230, 168, 92, 0.3);
      }

      to {
        box-shadow: 0 0 20px rgba(230, 168, 92, 0.6);
      }
    }

    /* DOTS */

    .dot {
      opacity: 0.2;
      animation: dotPulse 1.2s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes dotPulse {

      0%,
      80%,
      100% {
        opacity: 0.2;
        transform: translateY(0);
      }

      40% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    /* XR */

    #xr-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <script src="bundle.js"></script>
  
  <div id="start-overlay">
    <div id="content">
      <div id="visual-group">
        <img id="splash-art" src="./assets/splash-art.png"> 
        <img id="signature" src="./assets/signature.png">
      </div>
      <div id="progress-container">
        <div id="progress-track"><div id="progress-bar"></div></div>
        <span id="progress-text">Initializing Engine 0%</span>
      </div>
      <button id="start-button">
        <span id="btn-text">Setting Up AR</span> 
        <span class="dots-wrapper"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
      </button>
    </div>
  </div>
  <canvas id="xr-canvas"></canvas>

  <script>
  window.addEventListener("load", () => {
    const button = document.getElementById("start-button");
    const btnText = document.getElementById("btn-text");
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const progressContainer = document.getElementById("progress-container");
    const dotsWrapper = document.querySelector(".dots-wrapper");

    const videoAssets = [
      './assets/arvideos/bear_video.mp4',
      './assets/arvideos/crow_video.mp4',
      './assets/arvideos/donkey_video.mp4',
      './assets/arvideos/football_video.mp4',
      './assets/arvideos/bookshop_video.mp4',
      './assets/arvideos/sign_video.mp4',
      './assets/arvideos/crows_video.mp4',
      './assets/arvideos/television_video.mp4'
    ];

    let xrReady = false;
    let assetsDownloaded = false;
    let blobURLs = {};
    let lastProgressTime = Date.now();
    let watchdogInterval = null;

    const updateSystemStatus = (text, percent) => {
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${text} ${Math.round(percent)}%`;
      lastProgressTime = Date.now();
    };

    const startWatchdog = () => {
      watchdogInterval = setInterval(() => {
        if (assetsDownloaded) {
          clearInterval(watchdogInterval);
          return;
        }
        if (Date.now() - lastProgressTime > 15000) {
          clearInterval(watchdogInterval);
          progressText.textContent = "Connection stalled. Optimizing network...";
          setTimeout(() => { window.location.reload(); }, 1000);
        }
      }, 2000);
    };

    const downloadAllAssets = async () => {
      btnText.textContent = "Downloading Assets";
      let totalVideos = videoAssets.length;
      let progressMap = new Array(totalVideos).fill(0);
      
      startWatchdog();

      const downloadVideo = (url, index) => {
        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.responseType = 'blob';

          xhr.onprogress = (event) => {
            if (event.lengthComputable) {
              progressMap[index] = event.loaded / event.total;
              const totalProgress = (progressMap.reduce((a, b) => a + b, 0) / totalVideos) * 100;
              updateSystemStatus("Downloading Experience Assets", totalProgress);
            }
          };

          xhr.onload = () => {
            if (xhr.status === 200) {
              blobURLs[url] = URL.createObjectURL(xhr.response);
              resolve();
            } else { reject(); }
          };
          xhr.onerror = () => reject();
          xhr.send();
        });
      };

      try {
        await Promise.all(videoAssets.map((url, idx) => downloadVideo(url, idx)));
        assetsDownloaded = true;
        clearInterval(watchdogInterval);
        checkSystemReadiness();
      } catch (e) {
        progressText.textContent = "Network hiccup. Refreshing...";
        setTimeout(() => window.location.reload(), 25000);
      }
    };

    const checkSystemReadiness = () => {
      if (!xrReady) {
        updateSystemStatus("Calibrating AR Camera Tracking", 95);
        btnText.textContent = "Preparing Camera System";
        return;
      }
      if (!assetsDownloaded) return;

      progressContainer.style.opacity = "0";
      progressContainer.style.visibility = "hidden";
      setTimeout(() => progressContainer.remove(), 400);

      button.classList.add("active");
      btnText.textContent = "Start AR Experience";
      if (dotsWrapper) dotsWrapper.remove();
    };

    if (window.XR8) {
      xrReady = true;
      downloadAllAssets();
    } else {
      window.addEventListener("xrloaded", () => {
        xrReady = true;
        downloadAllAssets();
      });
    }

    // --- NEW FIXED INTERACTION LOGIC ---
    button.onclick = async () => {
      if (!button.classList.contains("active")) return;

      btnText.textContent = "Launching...";

      // 1. Prime the audio context securely 
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') await ctx.resume();
      } catch(e) {}

      // 2. Instead of finding missing DOM video tags, we create ONE global invisible 
      // video tag and play/pause it instantly. This satisfies the global user-gesture condition 
      // for ALL video media instances spun up inside this frame context.
      try {
        const structuralDummy = document.createElement('video');
        structuralDummy.setAttribute('playsinline', 'true');
        structuralDummy.muted = true;
        structuralDummy.src = blobURLs[videoAssets[0]]; // link any valid blob asset
        document.body.appendChild(structuralDummy);
        
        await structuralDummy.play();
        structuralDummy.pause();
        structuralDummy.remove(); // Clean up context instantly
      } catch (err) {
        console.warn("Media context setup bypassed:", err);
      }

      // 3. Inject blob URLs directly into the runtime ECS structure configuration map before unfreezing camera
      try {
        const ecsConfig = window.ecs?.application?.config?.objects;
        if (ecsConfig) {
          Object.keys(ecsConfig).forEach(entityId => {
            const ent = ecsConfig[entityId];
            // Check if object is a video configuration type
            if (ent.videoControls || (ent.material && ent.material.textureSrc)) {
              const currentSrc = ent.material?.textureSrc?.asset || ent.instanceData?.children?.['bf7fad6f-2adb-4b93-955d-65a6e8cf9fb9']?.material?.textureSrc?.asset;
              
              if (currentSrc) {
                // Find matching asset match sequence reference path
                const standardPath = './' + currentSrc; 
                if (blobURLs[standardPath]) {
                  if (ent.material?.textureSrc) ent.material.textureSrc.asset = blobURLs[standardPath];
                  if (ent.instanceData?.children?.['bf7fad6f-2adb-4b93-955d-65a6e8cf9fb9']?.material?.textureSrc) {
                    ent.instanceData.children['bf7fad6f-2adb-4b93-955d-65a6e8cf9fb9'].material.textureSrc.asset = blobURLs[standardPath];
                  }
                }
              }
            }
          });
        }
      } catch (ecsErr) {
        console.error("ECS stream injection error:", ecsErr);
      }

      // 4. Fade out overlay window interface smoothly
      const overlay = document.getElementById("start-overlay");
      overlay.style.opacity = 0;
      setTimeout(() => overlay.remove(), 450);

      // 5. Stagger tracking resumption cycle safely by 250ms 
      // This completely stops the engine from locking up/freezing.
      setTimeout(() => {
        try {
          if (window.XR8 && XR8.XrController) {
            XR8.XrController.resume();
          }
        } catch(e) {}
      }, 250);
    };
  });
  </script>
</body>
</html>
